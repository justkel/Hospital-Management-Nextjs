mutation CreatePatient($data: CreatePatientInput!) {
  createPatient(data: $data) {
    patient {
      id
      patientNumber
      fullName
      gender
      phoneNumber
      email
      bloodGroup
      emergency
    }
    warning
    matches {
      patientId
      patientNumber
      fullName
      confidence
    }
  }
}

