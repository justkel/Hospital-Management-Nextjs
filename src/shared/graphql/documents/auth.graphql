query GetAllStaff($page: Int! = 1, $limit: Int! = 25) {
  staffs(page: $page, limit: $limit) {
    items {
      id
      fullName
      email
      userCode
      userType
      roles
      status
      phoneNumber
      organizationId
    }
    total
    page
    pageCount
  }
}

query GetStaffByRole($role: StaffRole!) {
  staffByRole(role: $role) {
    id
    fullName
    email
    userCode
    userType
    roles
    status
    phoneNumber
    organizationId
  }
}

